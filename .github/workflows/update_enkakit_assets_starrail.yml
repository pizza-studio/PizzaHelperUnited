name: Update EnkaKit Assets (Starrail)
"on":
  workflow_dispatch: {}
  schedule:
    - cron: "0 18 * * 0,1,2,3"
jobs:
  update:
    runs-on: macOS-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Update EnkaKit Assets (Attempt 1/2)
        id: update_assets
        run: |
          zsh ./Script/_assetUpdate4HSR.sh
      - name: Check for deleted assets
        id: check_deletions
        run: |
          ASSETS_DIR="Packages/EnkaKit/Sources/EnkaKit/Resources/Assets.xcassets/MetaAssetsHSR"
          DELETED_FILES=$(git diff --name-only --diff-filter=D -- "$ASSETS_DIR" || true)
          if [ -z "$DELETED_FILES" ]; then
            echo "No deleted assets detected. Proceeding to PR."
            echo "has_deletions=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Deleted assets detected on attempt 1:"
            echo "$DELETED_FILES"
            echo "has_deletions=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Reset and retry (Attempt 2/2)
        if: steps.check_deletions.outputs.has_deletions == 'true'
        run: |
          echo "::warning::Restoring original assets and retrying..."
          ASSETS_DIR="Packages/EnkaKit/Sources/EnkaKit/Resources/Assets.xcassets/MetaAssetsHSR"
          git checkout -- "$ASSETS_DIR"
          git clean -fd -- "$ASSETS_DIR"
          zsh ./Script/_assetUpdate4HSR.sh
      - name: Verify no deleted assets after retry
        id: verify_retry
        if: steps.check_deletions.outputs.has_deletions == 'true'
        run: |
          ASSETS_DIR="Packages/EnkaKit/Sources/EnkaKit/Resources/Assets.xcassets/MetaAssetsHSR"
          DELETED_FILES=$(git diff --name-only --diff-filter=D -- "$ASSETS_DIR" || true)
          if [ -n "$DELETED_FILES" ]; then
            echo "::warning::Asset deletions persist after retry. Stripping deletions from changes."
            echo "$DELETED_FILES"
            echo "deletion_warning<<EOF" >> "$GITHUB_OUTPUT"
            echo "> [!WARNING]" >> "$GITHUB_OUTPUT"
            echo "> Asset deletions detected after retry. The following files were NOT regenerated by the script" >> "$GITHUB_OUTPUT"
            echo "> and have been kept as-is. This likely means the upstream data source no longer references" >> "$GITHUB_OUTPUT"
            echo "> these assets. Please investigate or update bannedFinalFileNames in HSR_RawAssetsPuller.swift." >> "$GITHUB_OUTPUT"
            echo ">" >> "$GITHUB_OUTPUT"
            while IFS= read -r f; do
              echo "> - \`$f\`" >> "$GITHUB_OUTPUT"
            done <<< "$DELETED_FILES"
            echo "EOF" >> "$GITHUB_OUTPUT"
            git checkout -- $DELETED_FILES
          else
            echo "Retry succeeded. No deleted assets."
            echo "deletion_warning=" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          branch: "update-enkakit-assets-hsr-${{ github.run_number }}"
          base: main
          title: Update EnkaKit Assets (Starrail)
          body: |
            This PR updates the generated EnkaKit Assets (Starrail).
            ${{ steps.verify_retry.outputs.deletion_warning }}
          delete-branch: true
          assignees: ShikiSuen
          reviewers: ShikiSuen
          team-reviewers: |
            owners
            maintainers
